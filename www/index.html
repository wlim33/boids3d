<!doctype html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Boids 3D</title>
  <style>
    body {
      top: 0;
      left: 0;
      max-width: 100%;
      max-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    section {
      position: absolute;
      left: 10px;
      top: 10px;
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      font-family: monospace;
      padding: 1em;
    }

    #drop-zone {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      padding: 0.5rem 1rem;
      border: 1px dashed rgba(255, 255, 255, 0.7);
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.4);
      color: #fff;
      opacity: 0.6;
      font-family: monospace;
      pointer-events: none;
      transition: opacity 0.2s, border-color 0.2s;
    }

    #drop-zone.active {
      opacity: 1;
      border-color: #ff79c6;
    }

    #drop-status {
      display: block;
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #9fccff;
      min-height: 1rem;
    }

    img {
      display: none;
    }

    button {
      font-family: monospace;
      display: inline-block;
      outline: none;
      cursor: pointer;
      border-radius: 3px;
      font-size: 14px;
      font-weight: 500;
      line-height: 16px;
      padding: 2px 16px;
      height: 32px;
      min-width: 60px;
      min-height: 32px;
      border: none;
      color: #fff;
      background-color: rgb(88, 101, 242);
      transition: background-color .17s ease, color .17s ease;

      :hover {
        background-color: rgb(71, 82, 196);
      }
    }

    #panel-toggle {
      display: none;
      position: fixed;
      left: 10px;
      top: 10px;
      z-index: 10;
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      font-size: 24px;
      width: 44px;
      height: 44px;
      min-width: 44px;
      min-height: 44px;
      padding: 0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
    }

    section.collapsed > *:not(#panel-toggle-placeholder) {
      display: none;
    }

    #file-input-wrapper {
      display: none;
      margin-top: 0.5em;
    }

    #file-input-wrapper .file-label {
      display: inline-block;
      padding: 8px 20px;
      min-height: 44px;
      line-height: 28px;
      background-color: rgb(88, 101, 242);
      color: #fff;
      border-radius: 3px;
      font-family: monospace;
      font-size: 14px;
      cursor: pointer;
    }

    #file-input-wrapper input[type="file"] {
      display: none;
    }

    .help-touch {
      display: none;
    }

    .help-desktop {
      display: block;
    }

    @media (hover: none) and (pointer: coarse) {
      #panel-toggle {
        display: block;
      }

      section {
        top: 60px;
        z-index: 5;
      }

      #drop-zone {
        display: none;
      }

      #file-input-wrapper {
        display: block;
      }

      .help-touch {
        display: block;
      }

      .help-desktop {
        display: none;
      }

      button {
        min-height: 44px;
        padding: 8px 20px;
      }

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        height: 8px;
        background: #555;
        border-radius: 4px;
        outline: none;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgb(88, 101, 242);
        cursor: pointer;
      }

      input[type="range"]::-moz-range-thumb {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgb(88, 101, 242);
        cursor: pointer;
        border: none;
      }
    }
  </style>
</head>

<body>
  <noscript>This page contains webassembly and javascript content, please enable
    javascript in your browser.</noscript>
  <canvas id="canvas"></canvas>
  <div id="drop-zone">Drop a .gltf file to replace the boid mesh</div>
  <img id="spritesheet" src="s.png" />
  <button id="panel-toggle" aria-label="Toggle controls">&#9776;</button>
  <section>
    <div>
      <label for="matching">matching</label>
      <input type="range" id="matching" min="0.0" max="0.25" step=".01" value="0.05" />
      <label id="matching-value" for="matching">0.05</label>
    </div>
    <div>
      <label for="avoidance">avoid</label>
      <input type="range" id="avoidance" min="0.0" max="0.25" step=".01" value="0.05" />
      <label id="avoidance-value" for="avoidance">0.05</label>
    </div>
    <div>
      <label for="cohesion">cohesion</label>
      <input type="range" id="cohesion" min="0.0" max="0.001" step="0.0001" value="0.0005" />
      <label id="cohesion-value" for="cohesion">0.0005</label>
    </div>
    <div>
      <label for="turn">turn</label>
      <input type="range" id="turn" min="0.0" max="1.0" step="0.025" value="0.2" />
      <label id="turn-value" for="turn">0.2</label>
    </div>
    <div>
      <label for="starting-boids">starting boids</label>
      <input type="range" id="starting-boids" min="0" max="1000" step="10" value="100" />
      <label id="starting-boids-value" for="starting-boids">100</label>
    </div>
    <div>
      <label for="instancing">GPU instancing</label>
      <input type="checkbox" id="instancing" />
    </div>
    <p><span id="fps-value">0.00 ms | 0.0 fps</span></p>
    <p>count: <span id="count-value">1.0</span></p>
    <div>
      <button id="add-1">
        Add 1
      </button>
      <button id="add-10">
        Add 10
      </button>
      <button id="add-100">
        Add 100
      </button>
    </div>
    <div id="file-input-wrapper">
      <label for="gltf-file" class="file-label">Load .gltf mesh</label>
      <input type="file" id="gltf-file" accept=".gltf" />
    </div>
    <p>
    </p>
    <small>
      <ul class="help-desktop">
        <li>
          Mouse to look around
        </li>
        <li>
          Scroll to change FOV
        </li>
        <li>
          WASD to move
        </li>
      </ul>
      <ul class="help-touch">
        <li>
          Touch and drag to look around
        </li>
        <li>
          Pinch to zoom
        </li>
      </ul>
    </small>
    <div id="drop-status" aria-live="polite"></div>
  </section>
  <script src="./bootstrap.js"></script>
</body>

</html>
